get:
  operationId: GetStoreCreditAccountsId
  summary: Get Customer's Store Credit Account
  x-sidebar-summary: Get Store Credit Account
  description: >-
    Retrieve logged-in customer's store credit account by its ID. You can expand
    the store credit account's relations or select the fields that should be
    returned.
  x-authenticated: true
  x-ignoreCleanup: true
  parameters:
    - name: id
      in: path
      description: The store credit account's ID.
      required: true
      schema:
        type: string
    - name: x-publishable-api-key
      in: header
      description: Publishable API Key created in the Medusa Admin.
      required: true
      schema:
        type: string
        externalDocs:
          url: https://docs.medusajs.com/api/store#publishable-api-key
    - name: x-medusa-locale
      in: header
      description: The locale in BCP 47 format to retrieve localized content.
      required: false
      schema:
        type: string
        example: en-US
        externalDocs:
          url: >-
            https://docs.medusajs.com/resources/commerce-modules/translation/storefront
          description: Learn more in the Serve Translations in Storefront guide.
    - name: locale
      in: query
      description: The locale in BCP 47 format to retrieve localized content.
      required: false
      schema:
        type: string
        example: en-US
        externalDocs:
          url: >-
            https://docs.medusajs.com/resources/commerce-modules/translation/storefront
          description: Learn more in the Serve Translations in Storefront guide.
  x-codeSamples:
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/store_store-credit-accounts_{id}/get.sh
  tags:
    - Store Credit Accounts
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/StoreStoreCreditAccountResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  security:
    - cookie_auth: []
    - jwt_token: []
  x-badges:
    - text: Plugin
      description: >
        This API route is only available through the [Loyalty
        Plugin](https://docs.medusajs.com/resources/commerce-modules/loyalty).
