get:
  operationId: GetGiftCardsId
  summary: Get a Gift Card
  description: >-
    Retrieve a gift card by its ID. You can expand the gift card's relations or
    select the fields that should be returned.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The gift card's ID.
      required: true
      schema:
        type: string
  security:
    - api_token: []
    - cookie_auth: []
    - jwt_token: []
  x-codeSamples:
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_gift-cards_{id}/get.sh
  tags:
    - Gift Cards
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdminGiftCardResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-badges:
    - text: Loyalty Plugin
      description: >
        This API route is only available through the [Loyalty
        Plugin](https://docs.medusajs.com/resources/commerce-modules/loyalty).
post:
  operationId: PostGiftCardsId
  summary: Update a Gift Card
  description: Update a gift card's details.
  x-authenticated: true
  x-ignoreCleanup: true
  parameters:
    - name: id
      in: path
      description: The gift card's ID.
      required: true
      schema:
        type: string
  security:
    - api_token: []
    - cookie_auth: []
    - jwt_token: []
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AdminUpdateGiftCardParams.yaml
  x-codeSamples:
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_gift-cards_{id}/post.sh
  tags:
    - Gift Cards
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdminGiftCardResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-badges:
    - text: Plugin
      description: >
        This API route is only available through the [Loyalty
        Plugin](https://docs.medusajs.com/resources/commerce-modules/loyalty).
