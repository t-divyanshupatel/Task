services:
  currency-converter-api:
    build:
      context: ..
      dockerfile: I5/Dockerfile
    image: currency-converter-api:i5
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
