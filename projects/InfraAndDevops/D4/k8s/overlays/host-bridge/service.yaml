apiVersion: v1
kind: Service
metadata:
  name: d4-notify
  namespace: d4-notify
  labels:
    app.kubernetes.io/name: d4-notify
    app.kubernetes.io/component: api
    d4-notify/mode: host-bridge
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
  # No selector — endpoints are managed manually (host uvicorn).
