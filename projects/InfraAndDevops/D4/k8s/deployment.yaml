apiVersion: apps/v1
kind: Deployment
metadata:
  name: d4-notify
  namespace: d4-notify
  labels:
    app.kubernetes.io/name: d4-notify
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: d4-notify
  template:
    metadata:
      labels:
        app.kubernetes.io/name: d4-notify
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: d4-notify:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: d4-notify-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
