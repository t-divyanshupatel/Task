post:
  operationId: PostMfaChallengesIdVerify
  summary: Verify a Multi-Factor Authentication (MFA) Challenge
  x-sidebar-summary: Verify MFA Challenge
  description: >
    Verify a multi-factor authentication (MFA) challenge issued during login. On
    success, this

    completes the authentication flow and returns a JWT token that can be used
    to authenticate

    subsequent requests.
  x-authenticated: false
  externalDocs:
    description: Learn more about MFA in Medusa
    url: https://docs.medusajs.com/resources/commerce-modules/auth/mfa
  parameters:
    - name: id
      in: path
      description: The MFA challenge's ID.
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: The details required to verify the MFA challenge.
          required:
            - method
            - code
          properties:
            method:
              type: string
              title: method
              description: >-
                The MFA method used to verify the challenge (for example, `totp`
                or `recovery-code`).
            code:
              type: string
              title: code
              description: The verification code generated by the chosen MFA method.
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/auth_mfa_challenges_{id}_verify/post.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/auth_mfa_challenges_{id}_verify/post.sh
  tags:
    - Multi-Factor Authentication (MFA) Factors
  responses:
    '200':
      description: OK
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-since: 2.15.3
