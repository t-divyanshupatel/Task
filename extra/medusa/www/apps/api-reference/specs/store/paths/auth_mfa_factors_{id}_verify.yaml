post:
  operationId: PostMfaFactorsIdVerify
  summary: Verify and Enable a Multi-Factor Authentication (MFA) Factor
  x-sidebar-summary: Verify and Enable MFA Factor
  description: >
    Verify a pending multi-factor authentication (MFA) factor by submitting a
    code generated from

    it. A successful verification enables the factor, after which it can be used
    to verify MFA

    challenges during login.
  x-authenticated: true
  externalDocs:
    description: Learn more about MFA in Medusa
    url: https://docs.medusajs.com/resources/commerce-modules/auth/mfa
  parameters:
    - name: id
      in: path
      description: The MFA factor's ID.
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: The details required to verify and enable the MFA factor.
          required:
            - code
          properties:
            code:
              type: string
              title: code
              description: >-
                The verification code generated by the MFA factor (for example,
                the current TOTP code from the authenticator app).
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/auth_mfa_factors_{id}_verify/post.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/auth_mfa_factors_{id}_verify/post.sh
  tags:
    - Multi-Factor Authentication (MFA) Factors
  responses:
    '200':
      description: OK
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-since: 2.15.3
