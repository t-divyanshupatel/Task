delete:
  operationId: DeleteMfaFactorsId
  summary: Disable a Multi-Factor Authentication (MFA) Factor
  x-sidebar-summary: Disable MFA Factor
  description: >
    Disable a multi-factor authentication (MFA) factor for the authenticated
    user. Once disabled,

    the factor can no longer be used to verify MFA challenges. When disabling a
    recovery-code

    factor, a valid recovery code must be provided in the request body.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The MFA factor's ID.
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: The details required to disable the MFA factor.
          properties:
            method:
              type: string
              title: method
              description: >-
                The MFA method used to authorize disabling the factor (for
                example, `recovery-code`).
            code:
              type: string
              title: code
              description: >-
                The verification code associated with the provided `method`,
                used to confirm the disable action.
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/auth_mfa_factors_{id}/delete.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/auth_mfa_factors_{id}/delete.sh
  tags:
    - Auth
  responses:
    '200':
      description: OK
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-since: 2.15.3
